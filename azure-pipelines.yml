trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "20.x"

stages:
  # --- Stage 1: Lint ---
  # Fails fast on code-quality/formatting issues before spending time on
  # tests or a full build.
  - stage: Lint
    displayName: "Lint"
    jobs:
      - job: Lint
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run lint
            displayName: "Run ESLint"

          - script: npm run format:check
            displayName: "Check Prettier formatting"

  # --- Stage 2: Test ---
  # Runs the full Jest suite with coverage, publishing both test results
  # (JUnit) and coverage (Cobertura) to Azure DevOps' built-in reporting.
  - stage: Test
    displayName: "Test"
    dependsOn: Lint
    jobs:
      - job: Test
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run test:ci
            displayName: "Run Jest tests with coverage"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "reports/junit.xml"
              failTaskOnFailedTests: true
            displayName: "Publish test results"

          - task: PublishCodeCoverageResults@2
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: "$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml"
            displayName: "Publish code coverage"

  # --- Stage 3: Build ---
  # Confirms the app actually builds for production — a lint/test pass
  # doesn't guarantee that on its own (e.g. type errors surfaced only at
  # build time, environment-specific issues, etc.).
  - stage: Build
    displayName: "Build"
    dependsOn: Test
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run build
            displayName: "Build Next.js app"
